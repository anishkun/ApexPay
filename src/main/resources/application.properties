spring.application.name=ApexPay

# Database Connection

spring.datasource.url=jdbc:postgresql://localhost:5432/ApexDB
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# Hibernate / JPA Settings
# Explicitly tell Spring we are using Postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Schema is migration-driven (Flyway). Hibernate only validates that the
# entity mappings match the migrated schema; it never alters it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway owns the schema in production.
spring.flyway.enabled=true

# Keep the connection stable
spring.datasource.hikari.connection-timeout=30000

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Publisher confirms: the relay marks an outbox event PUBLISHED only after the
# broker ACKs the message (correlated confirms + waitForConfirms).
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# Background outbox relay (polls outbox_events and publishes to RabbitMQ).
# Disabled in tests so it never races with assertions.
apexpay.outbox.relay.enabled=true

# Resilient outbox relay tunables.
# Backoff is exponential: delay(attempt) = min(base * 2^(attempt-1), max).
apexpay.outbox.max-attempts=5
apexpay.outbox.backoff-base-ms=1000
apexpay.outbox.backoff-max-ms=60000
apexpay.outbox.batch-size=100
apexpay.outbox.confirm-timeout-ms=5000
# Postgres supports FOR UPDATE SKIP LOCKED so concurrent relays grab disjoint batches.
apexpay.outbox.use-skip-locked=true