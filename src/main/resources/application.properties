spring.application.name=ApexPay

# Database Connection

spring.datasource.url=jdbc:postgresql://localhost:5432/ApexDB
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# Hibernate / JPA Settings
# Explicitly tell Spring we are using Postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Keep the connection stable
spring.datasource.hikari.connection-timeout=30000

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Background outbox relay (polls outbox_events and publishes to RabbitMQ).
# Disabled in tests so it never races with assertions.
apexpay.outbox.relay.enabled=true