# Postgres integration-test profile (activated via @ActiveProfiles("pg")).
#
# This profile is OPT-IN: only the Testcontainers Postgres integration tests
# enable it. It overrides the default test profile's H2 + create-drop + Flyway-off
# setup so those tests run against a REAL Postgres with the production-like
# pipeline: Flyway owns the schema and Hibernate only VALIDATES against it.
#
# The actual datasource URL/credentials are injected at runtime by
# @DynamicPropertySource (pointed at the throwaway container). The fast H2 unit
# tests never load this file, so they are unaffected.

# Flyway owns the schema here (mirrors production application.properties).
spring.flyway.enabled=true

# Hibernate must MATCH the migrated schema, never alter it. A failure here is a
# real V1-vs-entities mismatch.
spring.jpa.hibernate.ddl-auto=validate

# Talk to Postgres, not H2.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# The H2 driver default from the base test profile would otherwise win; clear it
# so Spring Boot derives the Postgres driver from the (container) JDBC URL.
spring.datasource.driver-class-name=org.postgresql.Driver

# Real Postgres supports FOR UPDATE SKIP LOCKED.
apexpay.outbox.use-skip-locked=true

# Concurrency proofs fire many threads at the idempotency facade at once; each
# in-flight transfer holds a JDBC connection while it waits on the pessimistic
# account lock. Size the pool comfortably above the test thread counts so the
# pool itself never becomes the bottleneck (the DB lock is what serializes them).
spring.datasource.hikari.maximum-pool-size=50
