# Test configuration: run the suite without any external infrastructure.
# An in-memory H2 database stands in for Postgres, and the RabbitMQ-facing
# pieces are quiet by default (the broker integration test opts back in).

spring.datasource.url=jdbc:h2:mem:apexpay;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Fast unit tests build their schema via Hibernate against H2; Flyway/Postgres
# migrations are not run here (a separate Testcontainers harness covers that).
spring.flyway.enabled=false

# Don't let @RabbitListener containers try to dial a broker during plain tests.
spring.rabbitmq.listener.simple.auto-startup=false

# Publisher confirms so the relay's waitForConfirms path works against the
# Testcontainers broker (harmless for the broker-less H2 unit tests).
spring.rabbitmq.publisher-confirm-type=correlated

# H2 (PostgreSQL mode) does not honour FOR UPDATE SKIP LOCKED the same way;
# the broker integration test uses the portable pessimistic-lock poll instead.
apexpay.outbox.use-skip-locked=false

# The scheduled outbox relay is disabled by default in tests so it never races
# with assertions; OutboxRabbitIntegrationTest turns it on explicitly.
apexpay.outbox.relay.enabled=false
